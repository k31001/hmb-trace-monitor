# SPDX-License-Identifier: Apache-2.0
#
# /docs 디렉토리를 GitHub Pages로 배포한다.
# Repo Settings → Pages → "Build and deployment" → Source: "GitHub Actions"
# 을 선택해두면 이 워크플로우가 자동으로 동작한다.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# 2026-06-02부터 GitHub Actions 런너의 기본 Node 런타임이 24로 바뀌고,
# 2026-09-16에 Node 20 런너가 제거된다. 그 전까지 미리 Node 24로 옮겨
# JavaScript 액션(actions/checkout, configure-pages, upload-pages-artifact 등)을
# Node 24에서 실행한다. 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 분석기로 합성 트레이스를 만들고 HTML 리포트를 docs/examples/ 아래에
      # 떨어뜨려, Jekyll이 그대로 사이트에 포함시키도록 한다. 매 푸시마다
      # 새로 생성하므로 코드/포맷 변경이 즉시 반영된다.
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # uv.lock은 gitignore에 있으므로 pyproject.toml을 캐시 키로 사용.
          cache-dependency-glob: "analyzer/pyproject.toml"

      - name: Setup Python
        run: uv python install 3.12

      - name: Generate sample trace report
        working-directory: analyzer
        run: |
          set -e
          uv sync
          SAMPLE=/tmp/firmware-trace-sample.bin
          uv run hmb-trace-synth "$SAMPLE" \
              -n 150000 --seed 42 \
              --drop-every 2500 --truncate-every 1200 --wrap-every 8000
          mkdir -p ../docs/examples
          uv run hmb-trace-analyze report "$SAMPLE" \
              -o ../docs/examples/sample-report.html
          ls -lh ../docs/examples/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --source . \
            --destination ../_site \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
