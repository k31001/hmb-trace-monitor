#
# /docs 디렉토리를 GitHub Pages로 배포한다.
# Repo Settings → Pages → "Build and deployment" → Source: "GitHub Actions"
# 을 선택해두면 이 워크플로우가 자동으로 동작한다.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# 2026-06-02부터 GitHub Actions 런너의 기본 Node 런타임이 24로 바뀌고,
# 2026-09-16에 Node 20 런너가 제거된다. 그 전까지 미리 Node 24로 옮겨
# JavaScript 액션(actions/checkout, configure-pages, upload-pages-artifact 등)을
# Node 24에서 실행한다. 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --source . \
            --destination ../_site \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
